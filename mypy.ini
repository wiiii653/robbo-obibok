[mypy]
python_version = 3.12
files = .
exclude = (?x)(
    ^tests/
    | ^venv/
    | ^build_.*\.py$
    | ^download_.*\.py$
    )
check_untyped_defs = True
follow_imports = silent
ignore_missing_imports = True
pretty = True
show_error_codes = True
warn_unused_configs = True

[mypy-entrypoint_state_protocols,entrypoint_state,entrypoint_bootstrap,entrypoint_bridge,entrypoint_components,entrypoint_resources,entrypoint_runtime_surface,runtime_protocols,legacy_runtime_bindings,entrypoint_module_builders]
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
warn_return_any = True
no_implicit_reexport = True
strict_equality = True
