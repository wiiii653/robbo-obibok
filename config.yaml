# ─── Robbo Obibot Configuration ──────────────────────────────────
# Copy this file to config.yaml and adjust to your needs.
# The bot falls back to sensible defaults for missing keys.

# Discord bot token (can also be set via DISCORD_BOT_TOKEN env var)
# token: ""  # token: "YOUR_DISCORD_BOT_TOKEN_HERE"

# Command prefix (default: !)
command_prefix: "!"

# ASMA Archive settings
asma:
  base_url: "https://asma.atari.org/asma/"
  top_dirs:
    - "Composers/"
    - "Games/"
    - "Groups/"
    - "Misc/"
    - "Unknown/"
  crawl_timeout: 15  # seconds per HTTP request
  cache_ttl: 24       # hours before re-crawl

# Audio settings
audio:
  sink_name: "asma_bot"         # PulseAudio null-sink name
  sample_rate: 48000            # output sample rate
  channels: 2                   # stereo
  format: "s16le"               # PCM format

# Playback
playback:
  loop: true                    # loop playlist after last track
  shuffle: true                 # shuffle on start
  crossfade: 0                  # crossfade seconds (0 = off)
