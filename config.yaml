# ─── Robbo Obibok Configuration ──────────────────────────────────
# Copy this file to config.yaml and adjust to your needs.
# The bot falls back to sensible defaults for missing keys.

# Discord bot token (can also be set via DISCORD_BOT_TOKEN env var)
# token: ""  # token: "YOUR_DISCORD_BOT_TOKEN_HERE"

# Command prefix (default: !)
command_prefix: "!"

# Optional: restrict bot to a single Discord server (guild ID).
# Uncomment and set to your server's ID for single-server mode.
# guild_id: 123456789012345678

# ASMA Archive settings
asma:
  base_url: "https://asma.atari.org/asma/"
  top_dirs:
    - "Composers/"
    - "Games/"
    - "Groups/"
    - "Misc/"
    - "Unknown/"
  crawl_timeout: 15       # seconds per HTTP request
  cache_ttl: 24            # hours before re-crawl

# High Voltage SID Collection (C64) settings
hvsc:
  base_url: "https://www.hvsc.c64.org/download/C64Music/"
  songlengths_url: "https://www.hvsc.c64.org/download/C64Music/DOCUMENTS/Songlengths.txt"
  cache_ttl: 168            # hours before re-download (1 week)
  enabled: true            # C64 SID radio — 60k+ tracks!

# ModArchive (Amiga tracker modules: MOD/XM/S3M/IT)
modarchive:
  base_url: "https://modarchive.org/index.php"
  download_url: "https://api.modarchive.org/downloads.php"
  cache_file: "modarchive_cache.json"

# Audio settings
audio:
  sink_name: "asma_bot"         # PulseAudio null-sink name
  sample_rate: 48000            # output sample rate
  channels: 2                   # stereo
  format: "s16le"               # PCM format
# The Compressor effect plugin is auto-enabled at startup
# for consistent loudness. Configure in ~/.config/audacious/config.

# Playback
playback:
  loop: true                    # loop playlist after last track
  shuffle: true                 # shuffle on start
  crossfade: 0                  # crossfade seconds (0 = off)

# YM Archive (Atari ST chiptunes)
ym:
  path: "archiwum/ym"
  cache_file: "ym_cache.json"

# Auto-start / Auto-stop
auto:
  start_channel: "Chiptune Radio"   # voice channel name to auto-start (empty = disabled)
  empty_timeout: 60             # seconds before disconnect when channel is empty (0 = disabled)
