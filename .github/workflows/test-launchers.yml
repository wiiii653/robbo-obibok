name: test-launchers

on:
  push:
    paths:
      - ".github/workflows/test-launchers.yml"
      - "Makefile"
      - "README.md"
      - "scripts/install.sh"
      - "deploy/robbo-obibok.service"
      - "deploy/robbo-obibok-strict.service"
      - "src/robbo_obibok/robbo_obibok_launcher.py"
      - "src/robbo_obibok/robbo_obibok_logged_launcher.py"
      - "run_bot.sh"
      - "scripts/test_launchers.sh"
      - "tests/test_install_assets.py"
      - "tests/test_robbo_obibok_launch.py"
      - "tests/test_runner_smoke.py"
  pull_request:
    paths:
      - ".github/workflows/test-launchers.yml"
      - "Makefile"
      - "README.md"
      - "scripts/install.sh"
      - "deploy/robbo-obibok.service"
      - "deploy/robbo-obibok-strict.service"
      - "src/robbo_obibok/robbo_obibok_launcher.py"
      - "src/robbo_obibok/robbo_obibok_logged_launcher.py"
      - "run_bot.sh"
      - "scripts/test_launchers.sh"
      - "tests/test_install_assets.py"
      - "tests/test_robbo_obibok_launch.py"
      - "tests/test_runner_smoke.py"

jobs:
  launchers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv
        run: python -m venv venv
      - name: Install requirements
        run: ./venv/bin/python -m pip install -r requirements.txt
      - name: Run launcher smoke suite
        run: PYTHONPATH=src/robbo_obibok ./scripts/test_launchers.sh
