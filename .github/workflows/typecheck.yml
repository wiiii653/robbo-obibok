name: typecheck

on:
  push:
    paths:
      - ".github/workflows/typecheck.yml"
      - "**.py"
      - "Makefile"
      - "mypy.ini"
      - "requirements*.txt"
  pull_request:
    paths:
      - ".github/workflows/typecheck.yml"
      - "**.py"
      - "Makefile"
      - "mypy.ini"
      - "requirements*.txt"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run static type checks
        run: make typecheck
